<svg viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgIV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B1E27"/>
      <stop offset="55%" stop-color="#0B0C10"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="beamIV" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#F2C879" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F2C879" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#F2C879" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeIV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0C10" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1200" fill="url(#bgIV)"/>

  <!-- searchlight beam, single sweep -->
  <rect x="-100" y="0" width="1000" height="700" fill="url(#beamIV)" transform="rotate(-8 400 300)"/>

  <!-- blueprint schematic: four city skylines stacked as thin bands, hinting at four cities -->
  <g opacity="0.5" stroke="#F2C879" stroke-width="1" fill="none">
    <polyline points="0,300 40,300 40,260 70,260 70,290 110,290 110,240 150,240 150,300 200,300" stroke-opacity="0.35"/>
    <polyline points="600,220 630,220 630,180 660,180 660,230 700,230 700,190 740,190 740,220 800,220" stroke-opacity="0.3"/>
    <polyline points="0,420 30,420 30,390 60,390 60,430 100,430 100,370 140,370 140,420" stroke-opacity="0.25"/>
    <polyline points="640,470 670,470 670,440 710,440 710,480 750,480 750,430 790,430" stroke-opacity="0.3"/>
  </g>

  <!-- clockwork gear motif, oversized, off-center -->
  <g transform="translate(400 380)">
    <g fill="#F2C879" fill-opacity="0.5">
      <rect x="-10" y="-172" width="20" height="34"/>
      <rect x="-10" y="138" width="20" height="34"/>
      <rect x="138" y="-10" width="34" height="20"/>
      <rect x="-172" y="-10" width="34" height="20"/>
      <g transform="rotate(45)">
        <rect x="-10" y="-172" width="20" height="34"/>
        <rect x="-10" y="138" width="20" height="34"/>
        <rect x="138" y="-10" width="34" height="20"/>
        <rect x="-172" y="-10" width="34" height="20"/>
      </g>
    </g>
    <circle r="150" fill="none" stroke="#F2C879" stroke-opacity="0.6" stroke-width="3"/>
    <circle r="60" fill="none" stroke="#F2C879" stroke-opacity="0.6" stroke-width="3"/>
    <!-- clock hands frozen mid-heist -->
    <line x1="0" y1="0" x2="0" y2="-95" stroke="#F2C879" stroke-width="4"/>
    <line x1="0" y1="0" x2="65" y2="30" stroke="#F2C879" stroke-width="4"/>
    <circle r="8" fill="#F2C879"/>
  </g>

  <!-- keyhole cut through the gear, the vault they're really after -->
  <g fill="#0B0C10">
    <circle cx="400" cy="360" r="22"/>
    <polygon points="388,378 412,378 402,420 398,420"/>
  </g>

  <!-- five-figure crew walk, foreground silhouettes -->
  <g fill="#05060a">
    <!-- simple walking figure silhouette, repeated -->
    <g id="figIV">
      <ellipse cx="0" cy="-58" rx="9" ry="10"/>
      <path d="M-14,-46 Q0,-52 14,-46 L18,10 L6,10 L2,-28 L-2,-28 L-6,10 L-18,10 Z"/>
    </g>
    <use xlink:href="#figIV" transform="translate(260 1010) scale(1.9)"/>
    <use xlink:href="#figIV" transform="translate(330 1000) scale(2.1)"/>
    <use xlink:href="#figIV" transform="translate(400 1015) scale(2.3)"/>
    <use xlink:href="#figIV" transform="translate(470 1000) scale(2.1)"/>
    <use xlink:href="#figIV" transform="translate(540 1010) scale(1.9)"/>
  </g>
  <rect x="0" y="990" width="800" height="210" fill="url(#fadeIV)"/>

  <text x="400" y="700" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="10" fill="#F2C879" opacity="0.85">HEIST / ACTION</text>
  <text x="400" y="790" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700" fill="#F5F3EE" letter-spacing="1">IRONVEIL</text>
  <text x="400" y="830" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#C9D3CE" opacity="0.85">Trust no one who taught you the job.</text>

  <line x1="220" y1="1120" x2="580" y2="1120" stroke="#F2C879" stroke-opacity="0.5"/>
  <text x="400" y="1160" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" letter-spacing="4" fill="#8B8F9B">A KLIEG HOUSE LAUNCH</text>
</svg>
