<svg viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgPH" cx="50%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#1a1c22"/>
      <stop offset="100%" stop-color="#020304"/>
    </radialGradient>
    <radialGradient id="hazePH" cx="50%" cy="34%" r="30%">
      <stop offset="0%" stop-color="#C9D3CE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9D3CE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1200" fill="url(#bgPH)"/>
  <circle cx="400" cy="410" r="260" fill="url(#hazePH)"/>

  <!-- concentric soundwave / broadcast rings, uneven like a dial being turned -->
  <g stroke="#C9D3CE" fill="none">
    <circle cx="400" cy="410" r="70" stroke-opacity="0.3"/>
    <circle cx="400" cy="410" r="120" stroke-opacity="0.22" stroke-dasharray="1 8"/>
    <circle cx="400" cy="410" r="175" stroke-opacity="0.16"/>
    <circle cx="400" cy="410" r="235" stroke-opacity="0.1" stroke-dasharray="1 10"/>
  </g>

  <!-- vintage microphone, the only solid object in frame -->
  <g fill="#C9D3CE" opacity="0.92">
    <rect x="384" y="330" width="32" height="70" rx="16"/>
    <rect x="378" y="326" width="44" height="8" rx="4" opacity="0.5"/>
    <rect x="381" y="356" width="38" height="4" opacity="0.4"/>
    <rect x="381" y="368" width="38" height="4" opacity="0.4"/>
    <rect x="381" y="380" width="38" height="4" opacity="0.4"/>
    <path d="M366 400 q0 34 34 34 q34 0 34 -34" fill="none" stroke="#C9D3CE" stroke-width="3"/>
    <line x1="400" y1="434" x2="400" y2="470" stroke="#C9D3CE" stroke-width="3"/>
    <path d="M370 470 h60 l-8 12 h-44 Z"/>
  </g>

  <!-- a second, fainter microphone ghosted behind and slightly offset: the caller who isn't really there -->
  <g fill="#C9D3CE" opacity="0.14">
    <rect x="394" y="322" width="32" height="70" rx="16"/>
    <path d="M376 392 q0 34 34 34 q34 0 34 -34" fill="none" stroke="#C9D3CE" stroke-width="3"/>
    <line x1="410" y1="426" x2="410" y2="462" stroke="#C9D3CE" stroke-width="3"/>
  </g>

  <!-- clock frozen at the same time every night -->
  <g transform="translate(400 410)" opacity="0.5">
    <circle r="10" fill="none" stroke="#8B8F9B" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-7" stroke="#8B8F9B" stroke-width="1"/>
    <line x1="0" y1="0" x2="5" y2="2" stroke="#8B8F9B" stroke-width="1"/>
  </g>

  <text x="400" y="760" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="10" fill="#C9D3CE" opacity="0.75">PSYCHOLOGICAL HORROR</text>
  <text x="400" y="860" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="#F5F3EE">PALE HOUR</text>
  <text x="400" y="900" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" fill="#C9D3CE" opacity="0.8">Some of her callers died before she was born.</text>

  <line x1="220" y1="935" x2="580" y2="935" stroke="#C9D3CE" stroke-opacity="0.4"/>
  <text x="400" y="980" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" letter-spacing="4" fill="#8B8F9B">A KLIEG HOUSE LAUNCH</text>
</svg>
